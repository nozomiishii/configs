# https://pnpm.io/settings
#
# ```bash
# pnpm config list
# ```

packages:
  - "packages/*"

# lefthook のフック登録は @nozomiishii/postinstall 経由で行うため、
# パッケージ自身の install スクリプト実行は不要
allowBuilds:
  '@swc/core': true
  esbuild: true
  lefthook: false
  unrs-resolver: true

# 依存解決のうまくいっていないdependenciesのdependenciesをrootのnode_modulesまで巻き上げる
publicHoistPattern:
  - "@types/*"
  - "*eslint*"
  - "*prettier*"
  - "*storybook*"

# pinバージョンでインストールする
savePrefix: ""
