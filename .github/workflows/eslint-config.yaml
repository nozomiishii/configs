name: ESLint Config

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: packages/eslint-config

jobs:
  static:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-slim
    timeout-minutes: 10

    permissions:
      contents: read # required by actions/checkout to fetch repository code
      pull-requests: read # required by dorny/paths-filter to list PR files via the GitHub API

    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check for changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          filters: |
            src:
              - 'packages/eslint-config/**'
              - '.github/workflows/eslint-config.yaml'

      - name: Setup Node
        if: steps.changes.outputs.src == 'true'
        uses: ./.github/actions/setup-node

      - name: Lint
        if: steps.changes.outputs.src == 'true'
        run: pnpm lint

      - name: Compiler check
        if: steps.changes.outputs.src == 'true'
        run: pnpm check:ts
