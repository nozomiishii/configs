name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

# デフォルト権限を無効化し、各ジョブで必要最小限の権限のみ付与する
permissions: {}

defaults:
  run:
    shell: bash

jobs:
  release-please:
    if: github.actor != 'nektos/act'

    runs-on: ubuntu-slim
    timeout-minutes: 10

    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      prs: ${{ steps.release-please.outputs.prs }}
      releases_created: ${{ steps.release-please.outputs.releases_created }}
      paths_released: ${{ steps.release-please.outputs.paths_released }}

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release-please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          config-file: .github/.release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

      - name: Echo release-please outputs
        if: steps.release-please.outputs
        env:
          RELEASE_PLEASE_OUTPUTS: ${{ toJson(steps.release-please) }}
        run: echo "$RELEASE_PLEASE_OUTPUTS"

  format:
    needs: release-please

    if: needs.release-please.outputs.prs

    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    strategy:
      matrix:
        pr: ${{ fromJson(needs.release-please.outputs.prs) }}

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}

      - name: Checkout release-please Pull Request
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ matrix.pr.headBranchName }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Configure Git user
        run: |
          git config --global user.name 'nozomiishii-release[bot]'
          git config --global user.email 'nozomiishii-release[bot]@users.noreply.github.com'

      - name: Format CHANGELOG.md
        run: |
          pnpm fix:md
          pnpm format:fix

      - name: Commit and push
        run: |
          git add '*.md' '**/*.md'
          git diff --cached --quiet && echo 'No changes to commit' && exit 0
          git commit -m 'chore: format CHANGELOG.md' --no-verify
          git push

  publish:
    needs: release-please

    permissions:
      # https://docs.npmjs.com/trusted-publishers
      id-token: write # Required for OIDC
      contents: read

    if: needs.release-please.outputs.releases_created == 'true' && needs.release-please.outputs.paths_released != '[]'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        path: ${{ fromJson(needs.release-please.outputs.paths_released) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Publish package
        run: pnpm --filter "./${{ matrix.path }}" publish
