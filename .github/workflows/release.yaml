name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

# デフォルト権限を無効化し、各ジョブで必要最小限の権限のみ付与する
permissions: {}

defaults:
  run:
    shell: bash

jobs:
  release-please:
    if: github.actor != 'nektos/act'

    runs-on: ubuntu-slim
    timeout-minutes: 10

    permissions:
      contents: write # required by release-please-action to create release tags and commits
      issues: write # kept to match release-please's documented permission set (avoids divergence-debugging later)
      pull-requests: write # required by release-please-action to open the release PR

    outputs:
      prs: ${{ steps.release-please.outputs.prs }}
      releases_created: ${{ steps.release-please.outputs.releases_created }}
      paths_released: ${{ steps.release-please.outputs.paths_released }}
      # No umbrella tag exists (root `.` sets skip-github-release by design), but
      # linked-versions syncs all components onto one commit, so the `nozo` tag reliably
      # pins the publish job to the release commit.
      tag_name: ${{ steps.release-please.outputs['packages/nozo--tag_name'] }}

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          # renovate: datasource=docker depName=1password/op versioning=semver
          version: "2.34.1"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write # kept to match release-please's documented permission set (avoids divergence-debugging later)
          permission-pull-requests: write
          # GitHub requires workflows:write to create a release/tag on a commit that is
          # not the current branch head. release-please tags the (already-merged, now
          # non-head) release commit, so without this the create-release call returns
          # 403 "Resource not accessible by integration".
          permission-workflows: write

      - name: Run release-please
        id: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .github/.release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

      - name: Echo release-please outputs
        if: steps.release-please.outputs
        env:
          RELEASE_PLEASE_OUTPUTS: ${{ toJson(steps.release-please) }}
        run: echo "$RELEASE_PLEASE_OUTPUTS"

  format:
    needs: release-please

    if: needs.release-please.outputs.prs && needs.release-please.outputs.prs != '[]'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write # required to push the formatted CHANGELOG commit back to the release-please PR branch

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          # renovate: datasource=docker depName=1password/op versioning=semver
          version: "2.34.1"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout release-please Pull Request
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ fromJson(needs.release-please.outputs.prs)[0].headBranchName }}
          persist-credentials: false # auth は後段の `gh auth setup-git` で配線する

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Configure Git user
        run: |
          git config --global user.name 'nozomiishii-release[bot]'
          git config --global user.email 'nozomiishii-release[bot]@users.noreply.github.com'

      - name: Format CHANGELOG.md
        run: |
          pnpm fix:md
          pnpm format:fix

      - name: Commit and push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh auth setup-git
          git add '*.md' '**/*.md'
          git diff --cached --quiet && echo 'No changes to commit' && exit 0
          git commit -m 'chore: format CHANGELOG.md' --no-verify
          git push

  publish:
    needs: release-please

    permissions:
      # https://docs.npmjs.com/trusted-publishers
      id-token: write # Required for OIDC
      contents: read

    if: needs.release-please.outputs.releases_created == 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Pin to the released tag, not the run's trigger commit: with rapid merges the
          # release-creating run may predate the version bump and republish a stale version.
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Publish all public packages
        run: pnpm -r publish --no-git-checks
